<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Interactive Particle Physics Playground with beautiful animations">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <!-- Open Graph / LinkedIn Meta Tags -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Particle Physics Playground">
  <meta property="og:description" content="An interactive particle physics simulation with beautiful animations built with Flutter">
  
  <title>Particle Physics Playground</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 100%);
    }
    
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #ffffff;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(138, 43, 226, 0.3);
      border-top: 4px solid #8a2be2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
  </div>
  
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
